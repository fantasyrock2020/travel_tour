name: project_structure
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

workspace:
  - packages/core
  - packages/shared
  - data
  - domain

dependencies:
  flutter:
    sdk: flutter

  path_provider: ^2.1.5
  uuid: ^4.5.3
  permission_handler: ^12.0.1
  go_router: ^17.2.3

  domain:
    path: './domain'

  core:
    path: './packages/core'

  shared:
    path: './packages/shared'

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.15.0
  injectable_generator: ^3.0.2
  freezed: ^3.2.3
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true
