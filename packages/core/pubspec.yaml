name: core
description: "A new Flutter package project."
version: 0.0.1
publish_to: none
homepage:

environment:
  sdk: ^3.10.1
  flutter: ">=1.17.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  dio: ^5.9.2
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  injectable: ^3.0.0
  json_annotation: ^4.12.0
  logger: ^2.7.0
  data:
    path: '../../data'

  domain:
    path: '../../domain'

  project_structure:
    path: '../../'

  flutter_secure_storage: ^10.0.0
  bloc: ^9.2.1
  intl: ^0.20.2

  shared:
    path: '../shared'
  shared_preferences: ^2.5.4
  flutter_bloc: ^9.1.1
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  build_runner: ^2.15.0
  injectable_generator: ^3.0.2
  freezed: ^3.2.3
  flutter_gen_runner: ^5.14.1
  json_serializable: ^6.14.0

flutter_gen:
  output: lib/asset_generator/
  line_length: 80

  integrations:
    image: true
    flutter_svg: true

  assets:
    enabled: true
    outputs:
      class_name: MyAssets
      style: camel-case

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/